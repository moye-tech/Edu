<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edu Monitor v2 · 教育行业实时情报台</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* 样式部分保持不变（太长，这里省略显示，但你直接复制你原来的 style 内容即可） */
:root {
  --bg-0:#040810; --bg-1:#070d1a; --bg-2:#0c1426; --bg-3:#101c34;
  --panel:#08111f; --panel-b:rgba(8,17,31,0.92);
  --blue:#3b82f6; --blue-d:#1d4ed8; --blue-g:rgba(59,130,246,0.07);
  --cyan:#06b6d4; --green:#10b981; --red:#f43f5e;
  --amber:#f59e0b; --purple:#8b5cf6; --orange:#fb923c;
  --border:rgba(59,130,246,0.13); --border-h:rgba(59,130,246,0.35);
  --text-0:#eef4ff; --text-1:#8ca0be; --text-2:#3d5070;
  --font-h:'Rajdhani',sans-serif; --font-m:'JetBrains Mono',monospace;
  --font-cn:'Noto Sans SC',sans-serif;
  --panel-w:270px; --top-h:46px; --bot-h:26px;
  --r:5px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-size:12px;font-family:var(--font-cn)}
body{
  background:var(--bg-0);color:var(--text-0);
  background-image: radial-gradient(ellipse 60% 40% at 50% 0%,rgba(59,130,246,0.05) 0%,transparent 60%);
}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.3);border-radius:2px}

/* 以下所有样式保持你原来的（为了节省篇幅，这里不再重复粘贴） */
 /* ... 你原来的全部 <style> 内容 ... */
</style>
</head>
<body>

<!-- 以下 HTML 结构保持不变（你的 loader、topbar、app、bot-strip 等全部保留） -->
<!-- 为节省篇幅，这里省略显示，但请保留你原来的全部 HTML 部分 -->

<!-- LOADING SCREEN -->
<div id="loader">
  <div class="loader-logo">EDU<em>MONITOR</em></div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <div class="loader-txt" id="loader-txt">INITIALIZING DATA PIPELINE...</div>
</div>

<!-- 其他所有 HTML 内容（topbar、app、panels、bot-strip、statusbar）请保留你原来的 -->

<script>
/* ═══════════════════════════════════════════════════
   STATE MANAGEMENT
   ═══════════════════════════════════════════════════ */
const State = {
  jobs: [], jobFilter: 'all',
  live: [], liveTotal: 0,
  github: [], ghTab: 'trending',
  keywords: [], kwTab: 'bid',
  hotspot: {}, hsTab: 'hot',
  videos: {}, vidTab: 'dy',
  aiCards: [], activeTags: new Set(['教育','AI','直播']),
  layers: { jobs:true, live:true, hubs:true, keywords:false, flow:false },
  timeRange: '1d',
  alerts: [],
  metrics: { jobsToday:0, liveCount:0, ghNew:0, alertCount:0 },
  radarHL: null,
  botOpen: true,
};

/* ═══════════════════════════════════════════════════
   API LAYER — Supabase（使用 Legacy anon public key）
   ═══════════════════════════════════════════════════ */
const API = {
  base: 'https://xaanwlwjumpcyyrdoeyg.supabase.co/rest/v1',

  async get(path) {
    try {
      const response = await fetch(this.base + path, {
        method: 'GET',
        headers: {
          // ←←← 这里粘贴你的 anon public key
          'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhYW53bHdqdW1wY3l5cmRvZXlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODgxODUsImV4cCI6MjA4OTk2NDE4NX0.yUspkn16fBQjRxNbiA3jdqAbmy63XWMyr_V-TbJ1pZs',   
          'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'  
        }
      });

      if (!response.ok) {
        const errorText = await response.text();
        console.error(`❌ ${path} 请求失败 ${response.status}:`, errorText);
        return [];
      }

      const data = await response.json();
      console.log(`✅ 获取 ${path} 数据成功 → ${data.length || 0} 条`, data);
      return data;
    } catch (error) {
      console.error(`❌ 请求 ${path} 失败:`, error);
      return [];
    }
  },

  getJobs:    () => API.get('/jobs'),
  getLive:    () => API.get('/live'),
  getGithub:  () => API.get('/github'),
  getKeywords:() => API.get('/keywords'),
  getHotspot: () => API.get('/hotspot'),
  getVideos:  () => API.get('/video'),
  getAlerts:  () => API.get('/alerts'),
};
/* ═══════════════════════════════════════════════════
   MODULE CONFIG
   ═══════════════════════════════════════════════════ */
const Modules = [
  { id:'jobs',     api:API.getJobs,     interval:300000, render:renderJobs },
  { id:'live',     api:API.getLive,     interval:60000,  render:renderLive },
  { id:'github',   api:API.getGithub,   interval:600000, render:renderGithub },
  { id:'keywords', api:API.getKeywords, interval:300000, render:renderKeywords },
  { id:'hotspot',  api:API.getHotspot,  interval:180000, render:renderHotspot },
  { id:'videos',   api:API.getVideos,   interval:120000, render:renderVideos },
  { id:'alerts',   api:API.getAlerts,   interval:60000,  render:processAlerts },
];

/* ═══════════════════════════════════════════════════
   MOCK DATA（作为备用）
   ═══════════════════════════════════════════════════ */
const MOCK = {
  '/edu/jobs': [],
  '/edu/live': [],
  '/edu/github': [],
  '/edu/keywords': [],
  '/edu/hotspot': { hot: [], policy: [], fund: [], social: [] },
  '/edu/video': { dy: [], bl: [], xhs: [], wb: [] },
  '/edu/alerts': []
};

/* ═══════════════════════════════════════════════════
   RENDER FUNCTIONS — 已全面优化兼容性
   ═══════════════════════════════════════════════════ */
const PLT_CLASS = { boss:'plt-boss', zhilian:'plt-zl', '51job':'plt-51', lagou:'plt-lg' };
const PLT_LABEL = { boss:'BOSS', zhilian:'智联', '51job':'前程', lagou:'拉勾' };

function renderJobs(data) {
  State.jobs = Array.isArray(data) ? data : [];
  const f = State.jobFilter;

  const list = f === 'all' ? State.jobs : State.jobs.filter(j => {
    if (j.platform === f) return true;
    const tags = j.tags || '';
    const tagStr = Array.isArray(tags) ? tags.join(',') : String(tags);
    return tagStr.toLowerCase().includes(f.toLowerCase());
  });

  document.getElementById('job-list').innerHTML = list.slice(0,6).map(j => `
    <div class="ji">
      <div class="ji-r1">
        <div class="ji-title">${j.title || '未知岗位'}</div>
        <div class="ji-plt ${PLT_CLASS[j.platform] || ''}">${PLT_LABEL[j.platform] || j.platform || '其他'}</div>
      </div>
      <div class="ji-r2">
        <span>${j.company || ''}</span>
        <span>📍${j.city || ''}</span>
        <span class="ji-sal">${j.salary || ''}</span>
        ${(j.tags ? (Array.isArray(j.tags) ? j.tags : String(j.tags).split(',')).map(t => 
          `<span class="ji-tag">${String(t).trim()}</span>`).join('') : '')}
      </div>
    </div>
  `).join('') || '<div style="color:#666; padding:20px; text-align:center;">暂无岗位数据，请在 Supabase 的 jobs 表中添加数据</div>';

  renderJobsChart();
}

function renderLive(data) {
  State.live = Array.isArray(data) ? data : [];
  const PC = { dy:'pdy', bl:'pbl', wx:'pwx' };
  const PN = { dy:'抖音', bl:'B站', wx:'视频号' };
  let total = 0;

  document.getElementById('live-rows').innerHTML = State.live.map(b => {
    if (b.live) total += (b.viewers || 0);
    const vs = (b.viewers || 0) >= 10000 
      ? (b.viewers/10000).toFixed(1) + '万' 
      : (b.viewers || 0).toLocaleString();

    return `
    <div class="live-row">
      <div class="ld ${b.live ? 'on' : 'off'}"></div>
      <div class="live-brand">${b.brand || '未知品牌'}</div>
      ${b.live 
        ? `<div class="live-v">👁 <b>${vs}</b></div><span style="font-size:9.5px;color:var(--green)">+${b.trend || 0}%</span>`
        : `<div style="font-size:9.5px;color:var(--text-2)">${b.next || '即将开播'}</div>`}
      <div class="live-plt ${PC[b.platform] || ''}">${PN[b.platform] || b.platform || ''}</div>
    </div>`;
  }).join('');

  const lc = State.live.filter(b => b.live).length;
  document.getElementById('hd-live').textContent = lc;
  document.getElementById('lp-badge').textContent = `● LIVE ${lc}`;
  document.getElementById('lt-val').textContent = (total/10000).toFixed(1) + '万';
}

function renderKeywords(data) {
  State.keywords = Array.isArray(data) ? data : [];
  document.getElementById('kw-tbody').innerHTML = State.keywords.map(k => `
    <tr>
      <td style="color:var(--text-0)">${k.kw || ''}</td>
      <td>
        <span class="kw-bar" style="width:${(k.heat || 0)*0.55}px;background:linear-gradient(90deg,var(--blue),var(--cyan))"></span>
        <span style="font-family:var(--font-m);font-size:8.5px;color:var(--text-2);margin-left:3px">${k.heat || 0}</span>
      </td>
      <td class="kw-price">¥${k.price || 0}</td>
      <td class="${(k.up || 0)>0 ? 'ku' : (k.up || 0)<0 ? 'kd' : 'kf'}">${(k.up || 0)>0 ? '+' : ''}${k.chg || 0}%</td>
    </tr>
  `).join('');
}

/* 其他 render 函数（renderGithub、renderHotspot、renderVideos 等）保持你原来的即可 */

/* BOOTSTRAP — 启动函数 */
async function bootstrap() {
  const steps = ['CONNECTING TO SUPABASE...', 'LOADING DATA PIPELINE...', 'INITIALIZING MODULES...', 'RENDERING PANELS...', 'SYSTEM READY'];
  const lt = document.getElementById('loader-txt');
  for (let i = 0; i < steps.length; i++) {
    lt.textContent = steps[i];
    await new Promise(r => setTimeout(r, 280));
  }

  await Promise.all(Modules.map(async m => {
    try {
      const data = await m.api();
      m.render(data);
      if (m.id !== 'live') setInterval(() => m.api().then(m.render), m.interval);
    } catch (e) {
      console.warn(`Module ${m.id} 加载失败`, e);
    }
  }));

  renderAiCards();
  renderTrendChart();
  renderJobsChart();
  initParticles();
  drawMap();
  updateClock();

  const loader = document.getElementById('loader');
  loader.style.opacity = '0';
  setTimeout(() => loader.style.display = 'none', 600);

  setTimeout(() => notify('✅ Edu Monitor v2 已成功连接 Supabase 真实数据', 'ok'), 800);
}

document.addEventListener('DOMContentLoaded', bootstrap);
</script>
</body>
</html>
