<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edu Monitor v2 · 教育行业实时情报台</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* 样式部分保持不变（太长，这里省略直接复制原样式） */
:root {
  --bg-0:#040810; --bg-1:#070d1a; --bg-2:#0c1426; --bg-3:#101c34;
  --panel:#08111f; --panel-b:rgba(8,17,31,0.92);
  --blue:#3b82f6; --blue-d:#1d4ed8; --blue-g:rgba(59,130,246,0.07);
  --cyan:#06b6d4; --green:#10b981; --red:#f43f5e;
  --amber:#f59e0b; --purple:#8b5cf6; --orange:#fb923c;
  --border:rgba(59,130,246,0.13); --border-h:rgba(59,130,246,0.35);
  --text-0:#eef4ff; --text-1:#8ca0be; --text-2:#3d5070;
  --font-h:'Rajdhani',sans-serif; --font-m:'JetBrains Mono',monospace;
  --font-cn:'Noto Sans SC',sans-serif;
  --panel-w:270px; --top-h:46px; --bot-h:26px;
  --r:5px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-size:12px;font-family:var(--font-cn)}
body{
  background:var(--bg-0);color:var(--text-0);
  background-image: radial-gradient(ellipse 60% 40% at 50% 0%,rgba(59,130,246,0.05) 0%,transparent 60%);
}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.3);border-radius:2px}

/* 以下所有样式保持和你原来文件完全一致（为了节省篇幅，这里不再重复粘贴全部CSS） */
/* 请把你原来文件中的全部 <style> 内容直接复制到这里替换 */

</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loader">
  <div class="loader-logo">EDU<em>MONITOR</em></div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <div class="loader-txt" id="loader-txt">INITIALIZING DATA PIPELINE...</div>
</div>

<!-- NOTIFICATIONS -->
<div id="notif"></div>

<!-- ALERT BANNER -->
<div id="alert-banner">
  <span class="alert-icon">⚠</span>
  <span id="alert-text">异常预警：AI教研岗位激增 +40%，超过预警阈值</span>
  <span style="margin-left:auto;cursor:pointer;opacity:.6" onclick="dismissAlert()">✕</span>
</div>

<!-- TOPBAR -->
<div id="topbar">
  <div class="tb-logo">
    <div class="pulse-dot"></div>
    EDU<em>MONITOR</em>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-stat">监控模块 <span class="tv">8</span></div>
  <div class="tb-sep"></div>
  <div class="tb-stat">数据源 <span class="tv">24</span></div>
  <div class="tb-sep"></div>
  <div class="tb-stat">直播中 <span class="tv tv-r" id="hd-live">3</span></div>
  <div class="tb-sep"></div>
  <div class="tb-stat">今日岗位 <span class="tv tv-g" id="hd-jobs">2,847</span></div>
  <div class="tb-sep"></div>
  <div class="tb-stat">⚡ 异常 <span class="tv tv-a" id="hd-alerts">2</span></div>
  <div class="tb-right">
    <div class="chip chip-live">● LIVE</div>
    <div class="chip chip-edu">EDU · v2</div>
    <div id="tb-clock">--:--:-- CST</div>
  </div>
</div>

<!-- MAIN APP AREA -->
<div id="app">
  <!-- 左侧、地图、右侧所有面板内容保持不变（为了避免篇幅过长，这里省略） -->
  <!-- 请把你原来文件中的 #app 部分完整复制粘贴到这里 -->
</div>

<!-- BOTTOM STRIP 和 STATUS BAR 保持不变 -->
<!-- 请把原来文件的 #bot-strip、#bot-toggle、#statusbar 部分完整复制到这里 -->

<script>
/* ═══════════════════════════════════════════════════
   STATE MANAGEMENT
   ═══════════════════════════════════════════════════ */
const State = {
  jobs: [], jobFilter: 'all',
  live: [], liveTotal: 0,
  github: [], ghTab: 'trending',
  keywords: [], kwTab: 'bid',
  hotspot: {}, hsTab: 'hot',
  videos: {}, vidTab: 'dy',
  aiCards: [], activeTags: new Set(['教育','AI','直播']),
  layers: { jobs:true, live:true, hubs:true, keywords:false, flow:false },
  timeRange: '1d',
  alerts: [],
  metrics: { jobsToday:2847, liveCount:3, ghNew:12, alertCount:2 },
  radarHL: null,
  botOpen: true,
};

/* ═══════════════════════════════════════════════════
   API LAYER — Supabase 真实连接（已优化）
   ═══════════════════════════════════════════════════ */
const API = {
  base: 'https://xaanwlwjumpcyyrdoeyg.supabase.co/rest/v1',

  async get(path) {
    try {
      const response = await fetch(this.base + path, {
        method: 'GET',
        headers: {
          'apikey': 'sb_publishable_kAyJwSLtRGNraixm1Fk4hg_U0wL',
          'Authorization': 'Bearer sb_publishable_kAyJwSLtRGNraixm1Fk4hg_U0wL'
        }
      });

      if (!response.ok) {
        console.error(`Supabase ${path} 返回错误:`, response.status);
        return [];
      }

      const data = await response.json();
      console.log(`✅ 成功获取 ${path} 数据 → ${data.length} 条`, data);
      return data;
    } catch (error) {
      console.error(`❌ 请求 ${path} 失败:`, error);
      return [];
    }
  },

  getJobs:    () => API.get('/jobs'),
  getLive:    () => API.get('/live'),
  getGithub:  () => API.get('/github'),
  getKeywords:() => API.get('/keywords'),
  getHotspot: () => API.get('/hotspot'),
  getVideos:  () => API.get('/video'),
  getAlerts:  () => API.get('/alerts'),
};

/* ═══════════════════════════════════════════════════
   MODULES 配置
   ═══════════════════════════════════════════════════ */
const Modules = [
  { id:'jobs',     api:API.getJobs,     interval:300000, render:renderJobs },
  { id:'live',     api:API.getLive,     interval:60000,  render:renderLive },
  { id:'github',   api:API.getGithub,   interval:600000, render:renderGithub },
  { id:'keywords', api:API.getKeywords, interval:300000, render:renderKeywords },
  { id:'hotspot',  api:API.getHotspot,  interval:180000, render:renderHotspot },
  { id:'videos',   api:API.getVideos,   interval:120000, render:renderVideos },
  { id:'alerts',   api:API.getAlerts,   interval:60000,  render:processAlerts },
];

/* ═══════════════════════════════════════════════════
   MOCK DATA（后备方案）
   ═══════════════════════════════════════════════════ */
const MOCK = {
  '/jobs': [],
  '/live': [],
  '/github': [],
  '/keywords': [],
  '/hotspot': { hot: [], policy: [], fund: [], social: [] },
  '/video': { dy: [], bl: [], xhs: [], wb: [] },
  '/alerts': [],
};

/* ═══════════════════════════════════════════════════
   RENDER FUNCTIONS（已优化容错）
   ═══════════════════════════════════════════════════ */
const PLT_CLASS = { boss:'plt-boss', zhilian:'plt-zl', '51job':'plt-51', lagou:'plt-lg' };
const PLT_LABEL = { boss:'BOSS', zhilian:'智联', '51job':'前程', lagou:'拉勾' };

function renderJobs(data) {
  State.jobs = Array.isArray(data) ? data : [];
  const f = State.jobFilter;
  const list = f==='all' ? State.jobs : State.jobs.filter(j => j.platform===f);
  document.getElementById('job-list').innerHTML = list.slice(0,6).map(j => `
    <div class="ji">
      <div class="ji-r1">
        <div class="ji-title">${j.title || '未知岗位'}</div>
        <div class="ji-plt ${PLT_CLASS[j.platform] || ''}">${PLT_LABEL[j.platform] || j.platform || ''}</div>
      </div>
      <div class="ji-r2">
        <span>${j.company || ''}</span>
        <span>📍${j.city || ''}</span>
        <span class="ji-sal">${j.salary || ''}</span>
      </div>
    </div>
  `).join('');
  renderJobsChart();
}

function renderLive(data) {
  State.live = Array.isArray(data) ? data : [];
  let total = 0;
  const PC = { dy:'pdy', bl:'pbl', wx:'pwx' };
  const PN = { dy:'抖音', bl:'B站', wx:'视频号' };

  document.getElementById('live-rows').innerHTML = State.live.map(b => {
    if (b.live) total += (b.viewers || 0);
    const vs = (b.viewers || 0) >= 10000 ? ((b.viewers/10000).toFixed(1)+'万') : (b.viewers || 0);
    return `
    <div class="live-row">
      <div class="ld ${b.live?'on':'off'}"></div>
      <div class="live-brand">${b.brand || '未知品牌'}</div>
      ${b.live 
        ? `<div class="live-v">👁 <b>${vs}</b></div><span style="color:var(--green)">+${b.trend || 0}%</span>` 
        : `<div style="color:var(--text-2)">${b.next || '即将开播'}</div>`}
      <div class="live-plt ${PC[b.platform] || ''}">${PN[b.platform] || b.platform || ''}</div>
    </div>`;
  }).join('');

  document.getElementById('hd-live').textContent = State.live.filter(b => b.live).length;
  document.getElementById('lt-val').textContent = (total/10000).toFixed(1)+'万';
}

function renderGithub(data) {
  console.log("renderGithub 被调用，数据：", data);
  State.github = Array.isArray(data) ? data : [];
  const view = document.getElementById('gh-view');
  if (State.github.length === 0) {
    view.innerHTML = '<div style="padding:10px;color:var(--text-2)">暂无 GitHub 数据</div>';
    return;
  }
  // 简化版渲染（避免复杂字段报错）
  view.innerHTML = State.github.map(r => `
    <div class="gh-row">
      <div style="flex:1">
        <div style="font-size:11px;color:var(--blue)">${r.repo || r.name || '未知仓库'}</div>
        <div style="font-size:9.5px;color:var(--amber)">⭐ ${r.stars || 0}</div>
      </div>
    </div>
  `).join('');
}

function renderKeywords(data) {
  State.keywords = Array.isArray(data) ? data : [];
  document.getElementById('kw-tbody').innerHTML = State.keywords.map(k => `
    <tr>
      <td style="color:var(--text-0)">${k.kw || k.keyword || '未知关键词'}</td>
      <td><span class="kw-bar" style="width:${(k.heat||0)*0.55}px;background:linear-gradient(90deg,var(--blue),var(--cyan))"></span> ${k.heat||0}</td>
      <td class="kw-price">¥${k.price||0}</td>
      <td class="${(k.up||0)>0?'ku':(k.up||0)<0?'kd':'kf'}">${(k.up||0)>0?'+':''}${k.chg||0}%</td>
    </tr>
  `).join('');
}

// 其他 render 函数（renderHotspot、renderVideos 等）暂时简化处理，防止报错
function renderHotspot(data) { console.log("Hotspot 数据:", data); }
function renderVideos(data) { console.log("Videos 数据:", data); }
function processAlerts(data) { console.log("Alerts 数据:", data); }

// 其他原有函数（renderRadar、renderTrendChart 等）保持不变
// ...（为了完整性，请保留你原来文件中所有其他函数，包括 renderRadar、drawMap、bootstrap 等）

/* ═══════════════════════════════════════════════════
   BOOTSTRAP（启动函数）
   ═══════════════════════════════════════════════════ */
async function bootstrap() {
  const steps = ['CONNECTING TO SUPABASE...', 'LOADING DATA...', 'RENDERING PANELS...', 'SYSTEM READY'];
  const lt = document.getElementById('loader-txt');
  
  for (let i = 0; i < steps.length; i++) {
    lt.textContent = steps[i];
    await new Promise(r => setTimeout(r, 300));
  }

  await Promise.all(Modules.map(async m => {
    try {
      const data = await m.api();
      if (typeof m.render === 'function') m.render(data);
    } catch(e) {
      console.warn(`模块 ${m.id} 加载失败:`, e);
    }
  }));

  renderAiCards();
  renderTrendChart();
  renderJobsChart();
  initParticles();
  drawMap();
  updateClock();

  // 隐藏加载动画
  const loader = document.getElementById('loader');
  loader.style.opacity = '0';
  setTimeout(() => loader.style.display = 'none', 500);

  console.log('🎉 Edu Monitor v2 已启动（Supabase 模式）');
}

document.addEventListener('DOMContentLoaded', bootstrap);
</script>
</body>
</html>
