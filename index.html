<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edu Monitor v2 - 测试版</title>
<style>
  body{margin:0;font-family:'Noto Sans SC',sans-serif;background:#040810;color:#eef4ff;height:100vh;display:flex;align-items:center;justify-content:center}
  .container{max-width:1100px;width:100%;padding:20px}
  .panel{background:#0c1426;border:1px solid #3b82f6;border-radius:12px;padding:20px;margin:15px 0}
  h2{margin:0 0 15px 0;color:#3b82f6;font-size:18px}
  .data{line-height:1.8;font-size:15px}
  .empty{color:#8ca0be}
</style>
</head>
<body>
<div class="container">
  <h1 style="text-align:center;margin-bottom:30px">EDU MONITOR v2</h1>

  <div class="panel">
    <h2>💼 今日岗位（jobs 表）</h2>
    <div id="jobs" class="data">加载中...</div>
  </div>

  <div class="panel">
    <h2>📡 直播中（live 表）</h2>
    <div id="live" class="data">加载中...</div>
  </div>

  <div class="panel">
    <h2>🎯 关键词（keywords 表）</h2>
    <div id="keywords" class="data">加载中...</div>
  </div>

  <div style="text-align:center;color:#666;margin-top:40px">
    RLS 关闭后这里应该显示真实数据<br>
    如果还有 401 错误，请把 Console 截图发给我
  </div>
</div>

<script>
const BASE = 'https://xaanwlwjumpcyyrdoeyg.supabase.co/rest/v1';
const KEY = 'sb_publishable_kAyJwSLtRGNraixm1Fk4hg_U0wL';

async function getData(table) {
  const res = await fetch(`${BASE}/${table}`, {
    headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
  });
  if (!res.ok) return [];
  return await res.json();
}

async function load() {
  // 岗位
  const jobs = await getData('jobs');
  document.getElementById('jobs').innerHTML = jobs.length 
    ? jobs.map(j => `<b>${j.title}</b> — ${j.company} (${j.city})<br>`).join('') 
    : '<span class="empty">暂无岗位数据（请确认表中有数据且 RLS 已关闭）</span>';

  // 直播
  const live = await getData('live');
  document.getElementById('live').innerHTML = live.length 
    ? live.map(l => `${l.brand}：${l.viewers} 人 ${l.live ? '● LIVE' : ''}<br>`).join('') 
    : '<span class="empty">暂无直播数据</span>';

  // 关键词
  const kw = await getData('keywords');
  document.getElementById('keywords').innerHTML = kw.length 
    ? kw.map(k => `${k.kw}（热度 ${k.heat}，出价 ¥${k.price}）<br>`).join('') 
    : '<span class="empty">暂无关键词数据</span>';
}

load();
</script>
</body>
</html>
